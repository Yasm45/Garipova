<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора | Пассажирам.РФ. Обучение перевозкам: автобус, электробус, трамвай</title>
    <!-- Подключение Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- ======================================== -->
        <!-- НАВИГАЦИЯ -->
        <!-- ======================================== -->
        <nav class="nav-links">
            <a href="../../index.html" class="brand">
                Пассажирам.<span>РФ</span>
            </a>
            <div class="nav-menu">
                <span class="admin-badge">
                    <i class="fas fa-shield-alt"></i> Администратор
                </span>
                <a href="admin.html" class="nav-active">Управление</a>
                <a href="#" onclick="logout()" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </div>
        </nav>

        <!-- ======================================== -->
        <!-- СТАТИСТИКА -->
        <!-- ======================================== -->
        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-card-icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statTotal">0</span>
                    <span class="stat-card-label">Всего заявок</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon status-new-icon">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statNew">0</span>
                    <span class="stat-card-label">Новые</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon status-learning-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statLearning">0</span>
                    <span class="stat-card-label">В обучении</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon status-completed-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-card-info">
                    <span class="stat-card-number" id="statCompleted">0</span>
                    <span class="stat-card-label">Завершено</span>
                </div>
            </div>
        </div>

        <!-- ======================================== -->
        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
        <!-- ======================================== -->
        <div class="card">
            <div class="admin-header">
                <div>
                    <h2><i class="fas fa-tasks"></i> Управление заявками</h2>
                    <p style="color: var(--gray); font-size: 14px;">Просматривайте и изменяйте статусы заявок</p>
                </div>
                <button class="btn btn-outline" onclick="refreshData()" style="width: auto; padding: 8px 16px; font-size: 14px;">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>

            <!-- Фильтры -->
            <div class="admin-filters">
                <div class="filter-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="adminSearch" placeholder="Поиск по ФИО..." oninput="filterApplications()">
                </div>
                <div class="filter-group">
                    <i class="fas fa-filter"></i>
                    <select id="adminStatusFilter" onchange="filterApplications()">
                        <option value="">Все статусы</option>
                        <option value="Новая">🟡 Новая</option>
                        <option value="Идет обучение">🔵 Идет обучение</option>
                        <option value="Обучение завершено">🟢 Обучение завершено</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-sort"></i>
                    <select id="adminSortFilter" onchange="sortTable(parseInt(this.value))">
                        <option value="0">Сортировка по ID</option>
                        <option value="1">Сортировка по ФИО</option>
                        <option value="2">Сортировка по транспорту</option>
                        <option value="3">Сортировка по дате</option>
                    </select>
                </div>
                <span class="admin-count" id="adminCount">
                    <i class="fas fa-database"></i> Всего: 0 заявок
                </span>
            </div>

            <!-- Таблица заявок -->
            <div class="table-wrapper">
                <table class="admin-table" id="adminTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)" style="cursor: pointer;">
                                <i class="fas fa-hashtag"></i> ID
                            </th>
                            <th onclick="sortTable(1)" style="cursor: pointer;">
                                <i class="fas fa-user"></i> ФИО
                            </th>
                            <th onclick="sortTable(2)" style="cursor: pointer;">
                                <i class="fas fa-bus"></i> Транспорт
                            </th>
                            <th onclick="sortTable(3)" style="cursor: pointer;">
                                <i class="fas fa-calendar"></i> Дата
                            </th>
                            <th><i class="fas fa-tag"></i> Статус</th>
                            <th><i class="fas fa-cog"></i> Действия</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <!-- Данные загружаются скриптом -->
                    </tbody>
                </table>
            </div>

            <!-- Информация о странице -->
            <div class="table-footer">
                <span id="pageInfo" style="color: var(--gray); font-size: 14px;">Показано 0 из 0</span>
                <div class="pagination" id="adminPagination"></div>
            </div>
        </div>

        <!-- ======================================== -->
        <!-- БЫСТРЫЕ ДЕЙСТВИЯ -->
        <!-- ======================================== -->
        <div class="quick-actions">
            <h4><i class="fas fa-bolt"></i> Быстрые действия</h4>
            <div class="quick-actions-grid">
                <button class="quick-action-btn" onclick="filterByStatus('Новая')">
                    <i class="fas fa-clock"></i>
                    <span>Показать новые</span>
                </button>
                <button class="quick-action-btn" onclick="filterByStatus('Идет обучение')">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Показать в обучении</span>
                </button>
                <button class="quick-action-btn" onclick="filterByStatus('Обучение завершено')">
                    <i class="fas fa-check-circle"></i>
                    <span>Показать завершенные</span>
                </button>
                <button class="quick-action-btn" onclick="resetFilters()">
                    <i class="fas fa-undo"></i>
                    <span>Сбросить фильтры</span>
                </button>
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
